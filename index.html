<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1E3E85" />
  <meta name="description" content="RemoteRecruit - The first fully global job board connecting candidates with opportunities worldwide. Fee-free, easy-to-use platform for full-time, part-time, and freelance workers." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <title>RemoteRecruit – The Global Job Board</title>
  <style>
    .preloader {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(135deg, #1E3E85 0%, #2a5ba8 50%, #336DA6 100%);
      z-index: 999999;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    .preloader.hide {
      animation: fadeOutPreloader 0.6s ease-out forwards;
    }

    .loader-container {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 150px;
      height: 150px;
    }

    .loader-logo {
      position: absolute;
      animation: pulse 1.5s ease-in-out infinite alternate;
      margin: 0;
      z-index: 10;
    }

    .loader-logo span {
      color: #52B4DA;
    }

    .spinner {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-top-color: #52B4DA;
      border-bottom-color: rgba(82, 180, 218, 0.2);
      animation: spin 1.5s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
      position: absolute;
    }

    .spinner-inner {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      border: 3px solid transparent;
      border-right-color: #52B4DA;
      border-left-color: rgba(82, 180, 218, 0.2);
      animation: spin-reverse 1s cubic-bezier(0.68, -0.55, 0.265, 1.55) infinite;
      position: absolute;
    }

    @keyframes spin {
      0% {
        transform: rotate(0deg);
      }
      100% {
        transform: rotate(360deg);
      }
    }

    @keyframes spin-reverse {
      0% {
        transform: rotate(360deg);
      }
      100% {
        transform: rotate(-360deg);
      }
    }

    @keyframes pulse {
      0% {
        opacity: 0.7;
        transform: scale(0.95);
      }
      100% {
        opacity: 1;
        transform: scale(1.05);
      }
    }

    @keyframes fadeOutPreloader {
      0% {
        opacity: 1;
        visibility: visible;
      }
      99% {
        visibility: visible;
      }
      100% {
        opacity: 0;
        visibility: hidden;
      }
    }

    .loading-text {
      margin-top: 1rem;
      font-family: 'Poppins', sans-serif;
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 6px;
      text-transform: uppercase;
      animation: blink 1.5s infinite both;
    }

    @keyframes blink {
      0%, 100% {
        opacity: 0.4;
      }
      50% {
        opacity: 1;
      }
    }

    body {
      margin: 0;
      padding: 0;
    }
  </style>
</head>

<body>
  <div id="root">
    <div id="global-preloader" class="preloader">
      <div class="loader-container">
        <div class="spinner"></div>
        <div class="spinner-inner"></div>
        <img class="loader-logo" title='home' alt='logo' src="/favicon.svg" width="123" height="50" decoding="async" style="position: absolute; opacity: 0;" />
      </div>
      <div class="loading-text">LOADING</div>
    </div>
  </div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
